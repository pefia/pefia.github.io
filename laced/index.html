<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>laced.cl — Coming Soon</title>
  <style>
    :root {
      --cursor-size: 52px;
      --flashlight-size: 260px;
      --flashlight-x: 50vw;
      --flashlight-y: 50vh;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    body {
      background: url('./bg.jpg') center center / cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        circle var(--flashlight-size) at var(--flashlight-x) var(--flashlight-y),
        rgba(0, 0, 0, 0.05) 0%,
        rgba(0, 0, 0, 0.15) 30%,
        rgba(0, 0, 0, 0.78) 70%,
        rgba(0, 0, 0, 0.88) 100%
      );
      z-index: 1;
    }

    .content {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      pointer-events: none;
    }

    .logo {
      width: min(45vw, 420px);
      min-width: 190px;
      height: auto;
      filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.6));
      pointer-events: none;
      user-select: none;
    }

    .ghost-btn {
      pointer-events: auto;
      border: 1.5px solid rgba(255, 255, 255, 0.82);
      background: rgba(0, 0, 0, 0.28);
      color: #fff;
      border-radius: 999px;
      padding: 0.9rem 1.8rem;
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.25) inset,
        0 10px 30px rgba(0, 0, 0, 0.45);
    }

    .cursor {
      position: fixed;
      width: var(--cursor-size);
      height: var(--cursor-size);
      pointer-events: none;
      z-index: 4;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      will-change: transform;
      user-select: none;
    }
  </style>
</head>
<body>
  <main class="content" aria-label="Coming soon">
    <img class="logo" src="./cursorlogo.webp" alt="Laced logo" />
    <button class="ghost-btn" type="button">KNOW THE PASSWORD?</button>
  </main>

  <img class="cursor" src="./cursorlogo.webp" alt="" aria-hidden="true" />

  <script>
    const root = document.documentElement;
    const cursor = document.querySelector('.cursor');

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;
    let vx = 3.2;
    let vy = 2.5;
    let autopilot = false;
    let rafId;
    let idleTimer;

    function setCursorPosition(px, py) {
      x = px;
      y = py;
      cursor.style.transform = `translate(${x - cursor.offsetWidth / 2}px, ${y - cursor.offsetHeight / 2}px)`;
      root.style.setProperty('--flashlight-x', `${x}px`);
      root.style.setProperty('--flashlight-y', `${y}px`);
    }

    function activateAutopilot() {
      if (autopilot) return;
      autopilot = true;
      loop();
    }

    function deactivateAutopilot() {
      autopilot = false;
      if (rafId) cancelAnimationFrame(rafId);
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(activateAutopilot, 2000);
    }

    function loop() {
      if (!autopilot) return;

      x += vx;
      y += vy;

      const maxX = window.innerWidth;
      const maxY = window.innerHeight;

      if (x >= maxX || x <= 0) {
        vx *= -1;
        x = Math.max(0, Math.min(maxX, x));
      }

      if (y >= maxY || y <= 0) {
        vy *= -1;
        y = Math.max(0, Math.min(maxY, y));
      }

      setCursorPosition(x, y);
      rafId = requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', (e) => {
      deactivateAutopilot();
      setCursorPosition(e.clientX, e.clientY);
      resetIdleTimer();
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (!e.touches[0]) return;
      deactivateAutopilot();
      setCursorPosition(e.touches[0].clientX, e.touches[0].clientY);
      resetIdleTimer();
    }, { passive: true });

    window.addEventListener('resize', () => {
      x = Math.min(window.innerWidth, x);
      y = Math.min(window.innerHeight, y);
      setCursorPosition(x, y);
    });

    setCursorPosition(x, y);
    resetIdleTimer();
  </script>
</body>
</html>
